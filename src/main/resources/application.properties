spring.application.name=credihub
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/credihub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.thymeleaf.cache=false
server.error.include-message=always
server.error.include-binding-errors=always
spring.mvc.hiddenmethod.filter.enabled=true
app.admin.password=${ADMIN_PASSWORD}
payment.service.url=http://localhost:8081
payment.service.api-key=${PAYMENT_SERVICE_API_KEY}
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Edit Profile')}"></head>

<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-grow-1">
    <div class="container mt-5">

        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card shadow border-0">
                    <div class="card-body p-4">

                        <h2 class="text-center mb-4">Edit Profile</h2>

                        <form th:action="@{/profile}"
                              th:object="${updateUserProfileRequest}"
                              method="post">

                            <input type="hidden" name="_method" value="put"/>

                            <div class="mb-3">
                                <label class="form-label">First Name</label>
                                <input class="form-control" th:field="*{firstName}">
                                <small class="text-danger" th:errors="*{firstName}"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input class="form-control" th:field="*{lastName}">
                                <small class="text-danger" th:errors="*{lastName}"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Phone Number</label>
                                <input class="form-control" th:field="*{phoneNumber}">
                                <small class="text-danger" th:errors="*{phoneNumber}"></small>
                            </div>

                            <div class="alert alert-danger" th:if="${profileError}" th:text="${profileError}"></div>

                            <div class="d-grid gap-2 d-md-flex justify-content-middle mt-4">
                                <a th:href="@{/profile}" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>

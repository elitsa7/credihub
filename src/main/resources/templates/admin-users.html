<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Change Roles</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body bg-light>
<div class="container p-5">
    <h2 class="text-center mb-4">Roles</h2>
    <div class="card-shadow border-0">
        <div class="card-body p-5">
            <table class="table table-striped table-hover align-middle">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.firstName + ' ' + user.lastName}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.role}"></td>
                    <td>
                        <form th:if="${user.role.name() == 'USER'}"
                              th:action="@{/admin/users/{id}/make-moderator(id=${user.id})}"
                              method="post">
                            <button class="btn btn-success btn-sm">Make Moderator</button>
                        </form>

                        <form th:if="${user.role.name() == 'MODERATOR'}"
                              th:action="@{/admin/users/{id}/remove-moderator(id=${user.id})}"
                              method="post">

                            <button class="btn btn-danger btn-sm">Remove Moderator</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

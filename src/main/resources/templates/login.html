<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Login')}"></head>

<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">

                        <h2 class="text-center mb-4">Login</h2>

                        <form th:object="${userLoginDTO}"
                              th:action="@{/auth/login}"
                              method="post">

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}">
                                <small class="text-danger" th:if="${#fields.hasErrors('email')}"
                                       th:errors="*{email}"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" th:field="*{password}">
                                <small class="text-danger" th:if="${#fields.hasErrors('password')}"
                                       th:errors="*{password}"></small>
                            </div>

                            <p class="text-danger text-center" th:if="${loginError}" th:text="${loginError}"></p>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary">Login</button>
                            </div>

                            <div class="text-center mt-3">
                                <p>Don't have an account?
                                    <a th:href="@{/auth/register}" class="text-decoration-none">Register</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

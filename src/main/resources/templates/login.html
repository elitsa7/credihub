<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login | CrediHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<main class="flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">

                        <h2 class="text-center mb-4">Login</h2>

                        <form th:object="${userLoginDTO}"
                              th:action="@{/auth/login}"
                              method="post">

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}">
                                <small class="text-danger" th:if="${#fields.hasErrors('email')}"
                                       th:errors="*{email}"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" th:field="*{password}">
                                <small class="text-danger" th:if="${#fields.hasErrors('password')}"
                                       th:errors="*{password}"></small>
                            </div>

                            <p class="text-danger text-center" th:if="${loginError}" th:text="${loginError}"></p>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary">Login</button>
                            </div>

                            <div class="text-center mt-3">
                                <p>Don't have an account?
                                    <a th:href="@{/auth/register}" class="text-decoration-none">Register</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-white text-center py-3 border-top">
    <p class="mb-0">© 2026 CrediHub. All rights reserved.</p>
</footer>
</body>
</html>

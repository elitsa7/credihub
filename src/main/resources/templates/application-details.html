<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Application Details')}"></head>

<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white text-center">
                    <h3 class="mb-0">Application Details</h3>
                </div>

                <div class="card-body">
                    <table class="table table-bordered align-middle">
                        <tbody>
                        <tr>
                            <th style="width: 30%">Loan Product</th>
                            <td th:text="${loanApplication.loanProduct.name}"></td>
                        </tr>

                        <tr>
                            <th>Status</th>
                            <td>
                                <span class="badge bg-warning"
                                      th:if="${loanApplication.status.name() == 'PENDING'}">Pending</span>

                                <span class="badge bg-success"
                                      th:if="${loanApplication.status.name() == 'APPROVED'}">Approved</span>

                                <span class="badge bg-danger"
                                      th:if="${loanApplication.status.name() == 'REJECTED'}">Rejected</span>

                                <span class="badge bg-secondary"
                                      th:if="${loanApplication.status.name() == 'CANCELLED'}">Cancelled</span>
                            </td>
                        </tr>
                        <tr>
                            <th>Requested Amount</th>
                            <td th:text="${loanApplication.requestedAmount + ' EUR'}"></td>
                        </tr>
                        <tr>
                            <th>Period</th>
                            <td th:text="${loanApplication.periodMonths + ' months'}"></td>
                        </tr>
                        <tr>
                            <th>Monthly Income</th>
                            <td th:text="${loanApplication.monthlyIncome + ' EUR'}"></td>
                        </tr>
                        <tr>
                            <th>Purpose</th>
                            <td th:text="${#strings.replace(loanApplication.loanPurpose.name(), '_', ' ')}"></td>
                        </tr>
                        <tr>
                            <th>Interest Rate</th>
                            <td th:text="${loanApplication.interestRate + '%'}"></td>
                        </tr>
                        <tr>
                            <th>Monthly Payment</th>
                            <td th:text="${loanApplication.monthlyPayment + ' EUR'}"></td>
                        </tr>
                        <tr>
                            <th>Total Repayment</th>
                            <td th:text="${loanApplication.totalRepaymentAmount + ' EUR'}"></td>
                        </tr>
                        <tr>
                            <th>Created At</th>
                            <td th:text="${#temporals.format(loanApplication.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                        </tr>

                        </tbody>
                    </table>

                    <div class="d-flex gap-2">

                        <a th:href="@{/applications}" class="btn btn-secondary">Back</a>

                        <form th:if="${loanApplication.status.name() == 'PENDING'}"
                              th:action="@{/applications/{id}/cancel(id=${loanApplication.id})}"
                              method="post">

                            <button type="submit" class="btn btn-danger">Cancel Application</button>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

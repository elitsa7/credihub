<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Edit Loan Product')}"></head>

<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-lg border-0">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Edit Loan Product</h2>

                    <form th:action="@{/admin/products/{id}(id=${productId})}" th:object="${loanProductDTO}"
                          method="post">

                        <input type="hidden" name="_method" value="PUT">

                        <div class="mb-3">
                            <label>Name</label>
                            <input class="form-control" type="text" th:field="*{name}">
                            <small class="text-danger" th:errors="*{name}"></small>
                        </div>

                        <div class="mb-3">
                            <label>Description</label>
                            <textarea class="form-control" th:field="*{description}"></textarea>
                            <small class="text-danger" th:errors="*{description}"></small>
                        </div>

                        <div class="mb-3">
                            <label>Min Amount</label>
                            <input class="form-control" type="number" th:field="*{minAmount}">
                            <small class="text-danger" th:errors="*{minAmount}"></small>
                        </div>

                        <div class="mb-3">
                            <label>Max Amount</label>
                            <input class="form-control" type="number" th:field="*{maxAmount}">
                            <small class="text-danger" th:errors="*{maxAmount}"></small>
                        </div>

                        <div class="mb-3">
                            <label>Min Period</label>
                            <input class="form-control" type="number" th:field="*{minPeriodMonths}">
                            <small class="text-danger" th:errors="*{minPeriodMonths}"></small>
                        </div>

                        <div class="mb-3">
                            <label>Max Period</label>
                            <input class="form-control" type="number" th:field="*{maxPeriodMonths}">
                            <small class="text-danger" th:errors="*{maxPeriodMonths}"></small>
                        </div>

                        <div class="mb-3">
                            <label>Base Interest Rate</label>
                            <input class="form-control" type="number" step="0.01" th:field="*{baseInterestRate}">
                            <small class="text-danger" th:errors="*{baseInterestRate}"></small>
                        </div>

                        <div class="mb-3">
                            <label>Monthly Interest Increase</label>
                            <input class="form-control" type="number" step="0.01" th:field="*{monthlyInterestIncrease}">
                            <small class="text-danger" th:errors="*{monthlyInterestIncrease}"></small>
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" th:field="*{active}">
                            <label class="form-check-label">Active</label>
                            <small class="text-danger" th:errors="*{active}"></small>
                        </div>

                        <div th:if="${productError}" class="alert alert-danger" th:text="${productError}"></div>

                        <button class="btn btn-primary">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

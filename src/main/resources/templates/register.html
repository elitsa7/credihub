<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

<head th:replace="~{fragments/head :: head('Register')}"></head>

<body class="bg-light d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">Register</h2>
                        <form class="form" th:object="${userRegisterDTO}" th:action="@{/auth/register}" method="post">
                            <div class="mb-3">
                                <label class="form-label">First name</label>
                                <input type="text" class="form-control" th:field="*{firstName}">
                                <small class="text-danger" th:if="${#fields.hasErrors('firstName')}"
                                       th:errors="*{firstName}"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Last name</label>
                                <input type="text" class="form-control" th:field="*{lastName}">
                                <small class="text-danger" th:if="${#fields.hasErrors('lastName')}"
                                       th:errors="*{lastName}"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Phone number</label>
                                <input type="text" class="form-control" th:field="*{phoneNumber}">
                                <small class="text-danger" th:if="${#fields.hasErrors('phoneNumber')}"
                                       th:errors="*{phoneNumber}"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Identification number</label>
                                <input type="text" class="form-control" th:field="*{identificationNumber}">
                                <small class="text-danger" th:if="${#fields.hasErrors('identificationNumber')}"
                                       th:errors="*{identificationNumber}"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="text" class="form-control" th:field="*{email}">
                                <small class="text-danger" th:if="${#fields.hasErrors('email')}"
                                       th:errors="*{email}"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" th:field="*{password}">
                                <small class="text-danger" th:if="${#fields.hasErrors('password')}"
                                       th:errors="*{password}"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirm password</label>
                                <input type="password" class="form-control" th:field="*{confirmPassword}">
                                <small class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}"
                                       th:errors="*{confirmPassword}"></small>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary">Register</button>
                            </div>

                            <div class="text-center mt-3">
                                <p>Already have an account?
                                    <a th:href="@{/auth/login}" class="text-decoration-none">Login</a>
                                </p>
                            </div>

                            <p class="text-danger text-center" th:if="${registerError}" th:text="${registerError}"></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

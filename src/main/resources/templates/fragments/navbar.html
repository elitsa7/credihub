<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="navbar">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">CrediHub</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="/">Home</a>

            <th:block th:if="${currentUser == null}">
                <a class="nav-link" th:href="@{/auth/login}">Login</a>
                <a class="nav-link" th:href="@{/auth/register}">Register</a>
            </th:block>

            <th:block th:if="${currentUser != null}">
                <a class="nav-link" th:href="@{/applications}">My applications</a>
                <a class="nav-link" th:if="${currentUser.role.name() == 'ADMIN'
                || currentUser.role.name() == 'MODERATOR'}"
                   th:href="@{/admin/dashboard}">Dashboard</a>
                <a class="nav-link" th:if="${currentUser.role.name() == 'ADMIN'}"
                   th:href="@{/admin/users}">User Management</a>
                <a class="nav-link" th:if="${currentUser.role.name() == 'ADMIN'}"
                   th:href="@{/admin/products}">Products</a>
                <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
            </th:block>

        </div>
    </div>
</nav>
</body>
</html>

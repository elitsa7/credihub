<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('My Profile')}"></head>

<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container mt-5">

        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card shadow border-0">
                    <div class="card-body p-4">

                        <h2 class="text-center mb-4">My Profile</h2>

                        <hr>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Name</label>
                            <p class="mb-0">
                                <span th:text="${profile.firstName}"></span>
                                <span th:text="${profile.lastName}"></span>
                            </p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <p th:text="${profile.email}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Phone Number</label>
                            <p th:text="${profile.phoneNumber}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Identification Number</label>
                            <p th:text="${profile.maskedIdentificationNumber}"></p>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Role</label>
                            <p th:text="${profile.role}"></p>
                        </div>

                        <div class="text-center mt-4">
                            <a th:href="@{/profile/edit}" class="btn btn-primary">Edit Profile</a>
                            <a th:href="@{/applications}" class="btn btn-outline-primary">My Applications</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
